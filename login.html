<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Miniver&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            ☕ Coffe
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="galeria.html">Galeria</a>
            <a href="contacto.html" class="active">Contactenos</a>
        </div>

        <div class="nav-icons">
            <a href="carrito.html"><span>🛒</span></a>
            <a href="login.html"><span>👤</span></a>
        </div>
    </nav>

    <main class="login">

    <div class="login-container">

        <div class="login-card">

            <h2>Bienvenido de vuelta</h2>

            <div class="user-icon">
                <i class="fa-solid fa-user"></i>
            </div>

            <label>Correo electronico</label>
            <input type="email">

            <label>Contraseña</label>
            <input type="password">

            <div class="recordar">
                <div>
                    <input type="checkbox"> Recordarme
                </div>

                <a href="#">¿Olvidaste la contraseña?</a>
            </div>

            <button class="btn-login">Iniciar sesion</button>

            <div class="divider">
                <span>Continua con</span>
            </div>

            <div class="social">

                <button class="google">
                    <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
                    Google
                </button>

                <button class="facebook">
                    <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png">
                    Facebook
                </button>

            </div>

            <p class="registro">
                ¿No tienes una cuenta? 
                <a href="#">Registrate aqui</a>
            </p>

            <p class="seguridad">
                🔒 Tus datos estan protegidos con encriptacion nivel empresarial
            </p>

        </div>

        <div class="coffee-img">

            <h3>El mejor cafe</h3>

            <img src="imagenes/img/coffee-hero-section.png" alt="cafe">

        </div>

    </div>

</main>
</body>
