<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Miniver&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/registro.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            ☕ Coffe
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="galeria.html">Galeria</a>
            <a href="contacto.html" class="active">Contactenos</a>
        </div>

        <div class="nav-icons">
            <a href="carrito.html"><span>🛒</span></a>
            <a href="login.html"><span>👤</span></a>
        </div>
    </nav>

<main class="registro">

    <div class="contenedor-registro">

        <div class="card izquierda">

            <div class="icono">
                <i class="fa-solid fa-user"></i>
            </div>

            <h2>¡Unete a Coffe shop!</h2>

            <form>

                <label>Número de Identificación</label>
                <input type="text">

                <div class="fila">
                    <div>
                        <label>Nombre</label>
                        <input type="text">
                    </div>

                    <div>
                        <label>Apellidos</label>
                        <input type="text">
                    </div>
                </div>

                <label>Edad</label>
                <input type="number">

                <label>Correo Electrónico</label>
                <input type="email">

                <label>Telefono</label>
                <input type="text">

            </form>

        </div>

        <div class="derecha">

            <div class="card">

                <form>

                    <label>Contraseña</label>
                    <input type="password">

                    <label>Confirmar contraseña</label>
                    <input type="password">

                    <p class="terminos">
                        Acepto los <span>terminos y condiciones</span> y la
                        <span>politica de privacidad</span>
                    </p>

                    <button>Registrarme</button>

                </form>

            </div>

            <div class="bebidas">

                <h3>Refresca tu<br>paladar</h3>

                <img src="imagenes/img/cold-beverages.png" alt="bebidas">
                <img src="imagenes/img/refreshment.png" alt="bebidas">

            </div>

        </div>

    </div>

</main>
</body>
